<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNMP NetConf Tool - 登录</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <div class="logo-icon">S</div>
                <h1>SNMP NetConf Tool</h1>
                <p class="subtitle">MIB 管理与 SNMP 设备交互平台</p>
            </div>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" placeholder="请输入用户名" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" placeholder="请输入密码" autocomplete="current-password" required>
                </div>
                <div id="loginError" class="login-error" style="display:none;"></div>
                <button type="submit" class="btn btn-primary btn-block" id="loginBtn">登 录</button>
            </form>
            <div class="login-hint">
                <p>默认账号: <code>admin</code> / <code>admin123</code></p>
                <p>操作员账号: <code>operator</code> / <code>operator123</code></p>
            </div>
        </div>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/login.js"></script>
</body>
</html>
