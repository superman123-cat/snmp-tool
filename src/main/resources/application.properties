# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/
server.tomcat.uri-encoding=UTF-8
server.tomcat.max-http-form-post-size=200MB
server.tomcat.max-swallow-size=200MB

# Spring Configuration
spring.application.name=snmp-netconf-tool
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=500MB
spring.servlet.multipart.enabled=true

# Async processing
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=16
spring.task.execution.pool.queue-capacity=100

# MIB storage configuration
app.mib.upload-dir=${user.dir}/mib-files
app.mib.max-file-size=10485760

# Authentication configuration
app.auth.enabled=true
app.auth.token-header=Authorization
app.auth.token-prefix=Bearer
app.auth.session-timeout-minutes=60
app.auth.admin.username=admin
# On first startup the system generates a strong random password for both
# admin and operator accounts and writes them to admin-credentials.txt under
# the logs directory (POSIX 0600 permissions, Windows: keep the file in a
# protected folder). Override the admin password at startup by setting the
# APP_AUTH_ADMIN_PASSWORD environment variable (12+ chars, mixed case + digit
# + symbol). The plaintext is never stored in source or configuration files.
app.auth.credentials-file=${user.dir}/logs/admin-credentials.txt

# CORS
app.cors.enabled=true

# Logging
logging.level.root=INFO
logging.level.com.snmpweb=DEBUG
logging.file.name=${user.dir}/logs/snmp-tool.log
